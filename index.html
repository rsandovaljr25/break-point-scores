<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Break Point Scores — Live Tennis Scores, Odds & Picks</title>
    <meta name="description" content="Live tennis scores, odds, picks leaderboard and player stats for ATP and WTA events. Roland Garros, Wimbledon, US Open and more." />
    <meta name="keywords" content="tennis scores, live tennis, ATP scores, WTA scores, tennis odds, Roland Garros, Wimbledon, US Open, tennis picks" />
    <link rel="canonical" href="https://breakpointscores.com" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Break Point Scores — Live Tennis" />
    <meta property="og:description" content="Live scores, odds, picks & player stats for every ATP and WTA match." />
    <meta property="og:url"         content="https://breakpointscores.com" />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="https://breakpointscores.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Break Point Scores" />
    <meta name="twitter:description" content="Live tennis scores, odds and picks." />
    <meta name="twitter:image"       content="https://breakpointscores.com/og-image.png" />

    <!-- Favicons -->
    <link rel="icon"             href="/favicon.ico" sizes="any" />
    <link rel="icon"             type="image/png" sizes="16x16"  href="/favicon-16.png" />
    <link rel="icon"             type="image/png" sizes="32x32"  href="/favicon-32.png" />
    <link rel="icon"             type="image/png" sizes="48x48"  href="/favicon-48.png" />
    <link rel="icon"             type="image/png" sizes="64x64"  href="/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180"                 href="/apple-touch-icon.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: 'Inter', Georgia, serif;
        background: #f5f5f2;
        -webkit-font-smoothing: antialiased;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #f0f0ec; }
      ::-webkit-scrollbar-thumb { background: #a8d828; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
